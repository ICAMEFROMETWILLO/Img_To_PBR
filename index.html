<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image 2 PBR (Texture Engine Plus)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: #0b0d13;
            color: #cbd5e1;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1700px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 22px;
            color: #f8fafc;
        }

        .app-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
        }

        .sidebar {
            background-color: #131722;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 16px;
            height: fit-content;
            max-height: 90vh;
            overflow-y: auto;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3b82f6;
            margin: 18px 0 8px 0;
            font-weight: 700;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .drop-zone {
            border: 2px dashed #3b82f6;
            background-color: #181f30;
            border-radius: 4px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .inline-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .inline-group > div {
            flex: 1;
        }

        label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        select, input[type="range"], button, input[type="color"], input[type="number"] {
            width: 100%;
            background-color: #090b11;
            border: 1px solid #242b3d;
            color: #f1f5f9;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }

        input[type="color"] {
            padding: 2px;
            height: 32px;
            cursor: pointer;
        }

        input[type="range"] {
            -webkit-appearance: none;
            padding: 0;
            height: 4px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-val {
            font-size: 11px;
            color: #64748b;
            min-width: 30px;
            text-align: right;
        }

        .btn-primary {
            background-color: #3b82f6;
            color: #ffffff;
            border: none;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-primary:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        .tab-container {
            display: flex;
            gap: 4px;
            background-color: #090b11;
            padding: 4px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 6px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            background: transparent;
            border: none;
            color: #94a3b8;
        }

        .tab.active {
            background-color: #1e293b;
            color: #f8fafc;
            font-weight: 600;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .map-card {
            background-color: #131722;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .map-title {
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
        }

        .canvas-container {
            background-color: #090b11;
            aspect-ratio: 1/1;
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #1e293b;
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .canvas-workspace {
            background-color: #131722;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .paint-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            background-color: #090b11;
            padding: 8px;
            border-radius: 4px;
            flex-wrap: wrap;
        }

        .paint-tool {
            width: auto;
            padding: 6px 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
        }

        .paint-tool.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .adsense-sidebar-wrap {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            background-color: #090b11;
            border: 1px solid #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }

        .batch-bar {
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PBR Texture Engine Pro</h1>
        <div class="batch-bar">
            <button class="btn-secondary" style="width: auto; padding: 8px 16px;" onclick="invertAllMaps()">Invert All Maps</button>
            <button class="btn-primary" style="width: auto; padding: 8px 16px; margin: 0;" onclick="downloadAll()">Download All Maps</button>
        </div>
    </header>

    <div class="app-grid">
        <div class="sidebar">
            <div class="section-title">Input Source Mode</div>
            <div class="tab-container">
                <button class="tab active" id="tabUpload" onclick="setSourceMode('upload')">File Upload</button>
                <button class="tab" id="tabPaint" onclick="setSourceMode('paint')">Blank Canvas</button>
            </div>

            <div id="uploadInputSection">
                <div class="section-title">Source Asset</div>
                <div class="drop-zone" id="dropZone">
                    <p style="font-size: 13px;" id="dropZoneText">Drop Raw Image Here</p>
                    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg, image/webp, image/avif, image/gif, image/svg+xml, image/bmp, image/tiff" style="display: none;">
                </div>
            </div>

            <div id="canvasConfigSection" style="display: none;">
                <div class="section-title">Canvas Resolution</div>
                <div class="inline-group">
                    <div>
                        <label>Width</label>
                        <select id="canvasWidth">
                            <option value="512">512</option>
                            <option value="1048" selected>1024</option>
                            <option value="2048">2048</option>
                        </select>
                    </div>
                    <div>
                        <label>Height</label>
                        <select id="canvasHeight">
                            <option value="512">512</option>
                            <option value="1048" selected>1024</option>
                            <option value="2048">2048</option>
                        </select>
                    </div>
                </div>
                <button class="btn-secondary" onclick="initBlankCanvas()">Create Base Canvas</button>
            </div>

            <div class="section-title">Workflow Config</div>
            <div class="control-group">
                <label>Target Game Engine</label>
                <select id="enginePreset">
                    <option value="unity-metal">Unity (Standard Metallic)</option>
                    <option value="unity-spec">Unity (Standard Specular)</option>
                    <option value="unreal">Unreal Engine 4 / 5 (ORM)</option>
                    <option value="godot">Godot 4.x</option>
                </select>
            </div>

            <div class="control-group">
                <label>Output Export Format</label>
                <select id="exportFormat">
                    <option value="image/png">PNG (.png)</option>
                    <option value="image/jpeg">JPEG (.jpg)</option>
                    <option value="image/webp">WEBP (.webp)</option>
                    <option value="image/bmp">BMP (.bmp)</option>
                </select>
            </div>

            <div class="section-title">Image Adjustments</div>
            <div class="inline-group">
                <div>
                    <label>Flip X</label>
                    <button class="btn-secondary" onclick="transformSource('flipX')">Flip Horizontal</button>
                </div>
                <div>
                    <label>Flip Y</label>
                    <button class="btn-secondary" onclick="transformSource('flipY')">Flip Vertical</button>
                </div>
            </div>
            <div class="inline-group">
                <div>
                    <label>Rotate</label>
                    <button class="btn-secondary" onclick="transformSource('rotate90')">90° CW</button>
                </div>
                <div>
                    <label>Grayscale Conversion</label>
                    <button class="btn-secondary" onclick="transformSource('grayscale')">Convert Source</button>
                </div>
            </div>

            <div class="section-title">PBR Map Modifiers</div>
            <div class="control-group">
                <label>Normal Map Intensity</label>
                <div class="range-container">
                    <input type="range" id="normalStrength" min="0.5" max="15" step="0.1" value="3.0">
                    <div class="range-val" id="normalVal">3.0</div>
                </div>
            </div>

            <div class="control-group">
                <label>Height Map Contrast</label>
                <div class="range-container">
                    <input type="range" id="heightContrast" min="0.1" max="5" step="0.1" value="1.0">
                    <div class="range-val" id="heightVal">1.0</div>
                </div>
            </div>

            <div class="control-group">
                <label>Height Map Brightness</label>
                <div class="range-container">
                    <input type="range" id="heightBrightness" min="-100" max="100" step="1" value="0">
                    <div class="range-val" id="heightBrightVal">0</div>
                </div>
            </div>

            <div class="control-group">
                <label>Roughness Global Multiplier</label>
                <div class="range-container">
                    <input type="range" id="roughnessBase" min="0" max="2" step="0.1" value="1.0">
                    <div class="range-val" id="roughVal">1.0</div>
                </div>
            </div>

            <div class="control-group">
                <label>Metallic Cutoff Threshold</label>
                <div class="range-container">
                    <input type="range" id="metallicThreshold" min="0" max="255" step="1" value="140">
                    <div class="range-val" id="metalThreshVal">140</div>
                </div>
            </div>

            <div class="control-group">
                <label>AO Crevice Depth</label>
                <div class="range-container">
                    <input type="range" id="aoStrength" min="0" max="100" step="1" value="30">
                    <div class="range-val" id="aoStrVal">30</div>
                </div>
            </div>

            <button class="btn-primary" id="processBtn" disabled>Generate PBR Maps</button>
            
            <div class="adsense-sidebar-wrap">
                <ins class="adsbygoogle"
                     style="display:block;width:300px;height:250px"
                     data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                     data-ad-slot="XXXXXXXXXX"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>

        <div class="main-panel">
            <div class="canvas-workspace">
                <div class="workspace-header">
                    <span style="font-size: 13px; font-weight: 600;">Interactive Editing Workspace (Albedo & Base Layer)</span>
                    <button class="btn-secondary" style="width: auto; padding: 4px 12px;" onclick="clearDrawCanvas()">Clear Workspace</button>
                </div>
                <div class="paint-toolbar">
                    <button class="paint-tool active" id="toolBrush" onclick="setTool('brush')">Brush</button>
                    <button class="paint-tool" id="toolEraser" onclick="setTool('eraser')">Eraser</button>
                    <div style="display: flex; align-items: center; gap: 6px; margin-left: 10px;">
                        <label style="margin: 0;">Size:</label>
                        <input type="number" id="brushSize" value="20" style="width: 60px; padding: 4px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px; margin-left: 10px;">
                        <label style="margin: 0;">Color:</label>
                        <input type="color" id="brushColor" value="#ffffff" style="width: 40px; height: 26px;">
                    </div>
                </div>
                <div class="canvas-container" style="max-height: 500px; aspect-ratio: auto;">
                    <canvas id="workspaceCanvas"></canvas>
                </div>
            </div>

            <div class="section-title">Generated PBR Output Channels</div>
            <div class="preview-grid" id="previewGrid"></div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const enginePreset = document.getElementById('enginePreset');
    const exportFormat = document.getElementById('exportFormat');
    const normalStrength = document.getElementById('normalStrength');
    const normalVal = document.getElementById('normalVal');
    const heightContrast = document.getElementById('heightContrast');
    const heightVal = document.getElementById('heightVal');
    const heightBrightness = document.getElementById('heightBrightness');
    const heightBrightVal = document.getElementById('heightBrightVal');
    const roughnessBase = document.getElementById('roughnessBase');
    const roughVal = document.getElementById('roughVal');
    const metallicThreshold = document.getElementById('metallicThreshold');
    const metalThreshVal = document.getElementById('metalThreshVal');
    const aoStrength = document.getElementById('aoStrength');
    const aoStrVal = document.getElementById('aoStrVal');
    const previewGrid = document.getElementById('previewGrid');

    const workspaceCanvas = document.getElementById('workspaceCanvas');
    const wsCtx = workspaceCanvas.getContext('2d', { willReadFrequently: true });

    let activeTool = 'brush';
    let isDrawing = false;
    let sourceMode = 'upload';

    const mapTypes = ['Albedo', 'Normal', 'Height', 'Metallic', 'Roughness', 'Smoothness', 'Specular', 'AmbientOcclusion', 'Packed'];

    mapTypes.forEach(map => {
        const card = document.createElement('div');
        card.className = 'map-card';
        card.innerHTML = `
            <div class="map-header">
                <span class="map-title" id="title-${map}">${map} Map</span>
                <button style="width: auto; padding: 2px 6px; font-size: 10px;" onclick="downloadCanvas('canvas-${map}', '${map}')">Export</button>
            </div>
            <div class="canvas-container">
                <canvas id="canvas-${map}"></canvas>
            </div>
        `;
        previewGrid.appendChild(card);
    });

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFileSelect);
    
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        }
    });

    normalStrength.addEventListener('input', (e) => { normalVal.textContent = e.target.value; });
    heightContrast.addEventListener('input', (e) => { heightVal.textContent = e.target.value; });
    heightBrightness.addEventListener('input', (e) => { heightBrightVal.textContent = e.target.value; });
    roughnessBase.addEventListener('input', (e) => { roughVal.textContent = e.target.value; });
    metallicThreshold.addEventListener('input', (e) => { metalThreshVal.textContent = e.target.value; });
    aoStrength.addEventListener('input', (e) => { aoStrVal.textContent = e.target.value; });
    enginePreset.addEventListener('change', updatePackedLabel);

    function setSourceMode(mode) {
        sourceMode = mode;
        document.getElementById('tabUpload').className = mode === 'upload' ? 'tab active' : 'tab';
        document.getElementById('tabPaint').className = mode === 'paint' ? 'tab active' : 'tab';
        document.getElementById('uploadInputSection').style.display = mode === 'upload' ? 'block' : 'none';
        document.getElementById('canvasConfigSection').style.display = mode === 'paint' ? 'block' : 'none';
    }

    function initBlankCanvas() {
        const w = parseInt(document.getElementById('canvasWidth').value);
        const h = parseInt(document.getElementById('canvasHeight').value);
        workspaceCanvas.width = w;
        workspaceCanvas.height = h;
        wsCtx.fillStyle = '#222222';
        wsCtx.fillRect(0, 0, w, h);
        processBtn.disabled = false;
    }

    function handleFileSelect() {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                workspaceCanvas.width = img.width;
                workspaceCanvas.height = img.height;
                wsCtx.drawImage(img, 0, 0);
                processBtn.disabled = false;
                document.getElementById('dropZoneText').textContent = file.name;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function setTool(tool) {
        activeTool = tool;
        document.getElementById('toolBrush').className = tool === 'brush' ? 'paint-tool active' : 'paint-tool';
        document.getElementById('toolEraser').className = tool === 'eraser' ? 'paint-tool active' : 'paint-tool';
    }

    function getMousePos(canvas, evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: ((evt.clientX - rect.left) / rect.width) * canvas.width,
            y: ((evt.clientY - rect.top) / rect.height) * canvas.height
        };
    }

    workspaceCanvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        draw(e);
    });
    workspaceCanvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', () => isDrawing = false);

    function draw(e) {
        if (!isDrawing) return;
        const pos = getMousePos(workspaceCanvas, e);
        const size = parseInt(document.getElementById('brushSize').value);
        
        wsCtx.lineWidth = size;
        wsCtx.lineCap = 'round';
        wsCtx.lineJoin = 'round';

        if (activeTool === 'brush') {
            wsCtx.strokeStyle = document.getElementById('brushColor').value;
            wsCtx.globalCompositeOperation = 'source-over';
        } else {
            wsCtx.strokeStyle = '#222222';
            wsCtx.globalCompositeOperation = 'source-over';
        }

        if (e.type === 'mousedown') {
            wsCtx.beginPath();
            wsCtx.moveTo(pos.x, pos.y);
        }
        wsCtx.lineTo(pos.x, pos.y);
        wsCtx.stroke();
    }

    function clearDrawCanvas() {
        wsCtx.fillStyle = '#222222';
        wsCtx.fillRect(0, 0, workspaceCanvas.width, workspaceCanvas.height);
    }

    function transformSource(action) {
        const w = workspaceCanvas.width;
        const h = workspaceCanvas.height;
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(workspaceCanvas, 0, 0);

        if (action === 'flipX') {
            wsCtx.clearRect(0, 0, w, h);
            wsCtx.save();
            wsCtx.translate(w, 0);
            wsCtx.scale(-1, 1);
            wsCtx.drawImage(tempCanvas, 0, 0);
            wsCtx.restore();
        } else if (action === 'flipY') {
            wsCtx.clearRect(0, 0, w, h);
            wsCtx.save();
            wsCtx.translate(0, h);
            wsCtx.scale(1, -1);
            wsCtx.drawImage(tempCanvas, 0, 0);
            wsCtx.restore();
        } else if (action === 'rotate90') {
            workspaceCanvas.width = h;
            workspaceCanvas.height = w;
            wsCtx.clearRect(0, 0, h, w);
            wsCtx.save();
            wsCtx.translate(h / 2, w / 2);
            wsCtx.rotate(90 * Math.PI / 180);
            wsCtx.drawImage(tempCanvas, -w / 2, -h / 2);
            wsCtx.restore();
        } else if (action === 'grayscale') {
            const imgData = wsCtx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                let g = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                data[i] = data[i+1] = data[i+2] = g;
            }
            wsCtx.putImageData(imgData, 0, 0);
        }
    }

    function updatePackedLabel() {
        const preset = enginePreset.value;
        const lbl = document.getElementById('title-Packed');
        if (preset === 'unity-metal') lbl.textContent = "Packed (Metallic Smoothness)";
        else if (preset === 'unity-spec') lbl.textContent = "Packed (Specular Smoothness)";
        else if (preset === 'unreal') lbl.textContent = "Packed (ORM Map)";
        else if (preset === 'godot') lbl.textContent = "Packed (Material Mask)";
    }

    processBtn.addEventListener('click', () => {
        const w = workspaceCanvas.width;
        const h = workspaceCanvas.height;
        if (w === 0 || h === 0) return;

        const canvases = {};
        const ctxs = {};

        mapTypes.forEach(map => {
            canvases[map] = document.getElementById(`canvas-${map}`);
            canvases[map].width = w;
            canvases[map].height = h;
            ctxs[map] = canvases[map].getContext('2d');
        });

        ctxs['Albedo'].drawImage(workspaceCanvas, 0, 0);
        const imgData = ctxs['Albedo'].getImageData(0, 0, w, h);
        const src = imgData.data;

        const normImg = ctxs['Normal'].createImageData(w, h);
        const normDst = normImg.data;
        const nStr = parseFloat(normalStrength.value);
        const invY = enginePreset.value === 'unreal';

        const hImg = ctxs['Height'].createImageData(w, h);
        const hDst = hImg.data;
        const hCtrl = parseFloat(heightContrast.value);
        const hBright = parseInt(heightBrightness.value);

        const mImg = ctxs['Metallic'].createImageData(w, h);
        const mDst = mImg.data;
        const mThresh = parseInt(metallicThreshold.value);

        const rImg = ctxs['Roughness'].createImageData(w, h);
        const rDst = rImg.data;
        const rBase = parseFloat(roughnessBase.value);

        const sImg = ctxs['Smoothness'].createImageData(w, h);
        const sDst = sImg.data;

        const specImg = ctxs['Specular'].createImageData(w, h);
        const specDst = specImg.data;

        const aoImg = ctxs['AmbientOcclusion'].createImageData(w, h);
        const aoDst = aoImg.data;
        const aoStr = parseInt(aoStrength.value);

        const pImg = ctxs['Packed'].createImageData(w, h);
        const pDst = pImg.data;

        const preset = enginePreset.value;

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const idx = (y * w + x) * 4;

                let tl = getMono(src, x - 1, y - 1, w, h);
                let t  = getMono(src, x,     y - 1, w, h);
                let tr = getMono(src, x + 1, y - 1, w, h);
                let l  = getMono(src, x - 1, y,     w, h);
                let r  = getMono(src, x + 1, y,     w, h);
                let bl = getMono(src, x - 1, y + 1, w, h);
                let b  = getMono(src, x,     y + 1, w, h);
                let br = getMono(src, x + 1, y + 1, w, h);

                let dx = (tr + 2.0 * r + br) - (tl + 2.0 * l + bl);
                let dy = (bl + 2.0 * b + br) - (tl + 2.0 * t + tr);
                let dz = 1.0 / nStr;

                let len = Math.sqrt(dx * dx + dy * dy + dz * dz);
                dx /= len; dy /= len; dz /= len;

                if (invY) { dy = -dy; }

                normDst[idx]     = Math.floor((dx + 1.0) * 127.5);
                normDst[idx + 1] = Math.floor((dy + 1.0) * 127.5);
                normDst[idx + 2] = Math.floor((dz + 1.0) * 127.5);
                normDst[idx + 3] = 255;

                let gray = (src[idx] * 0.299 + src[idx + 1] * 0.587 + src[idx + 2] * 0.114);
                
                let hVal = ((gray - 127.5) * hCtrl) + 127.5 + hBright;
                hVal = Math.min(255, Math.max(0, hVal));
                hDst[idx] = hDst[idx + 1] = hDst[idx + 2] = hVal;
                hDst[idx + 3] = 255;

                let rVal = Math.min(255, Math.max(0, (255 - hVal) * rBase));
                rDst[idx] = rDst[idx + 1] = rDst[idx + 2] = rVal;
                rDst[idx + 3] = 255;

                let smVal = 255 - rVal;
                sDst[idx] = sDst[idx + 1] = sDst[idx + 2] = smVal;
                sDst[idx + 3] = 255;

                let mVal = (hVal > mThresh) ? Math.floor((hVal - mThresh) * 1.5) : 0;
                mVal = Math.min(255, mVal);
                mDst[idx] = mDst[idx + 1] = mDst[idx + 2] = mVal;
                mDst[idx + 3] = 255;

                let aoVal = Math.min(255, hVal + aoStr);
                aoDst[idx] = aoDst[idx + 1] = aoDst[idx + 2] = aoVal;
                aoDst[idx + 3] = 255;

                specDst[idx]     = Math.floor(src[idx] * 0.3 + mVal * 0.7);
                specDst[idx + 1] = Math.floor(src[idx + 1] * 0.3 + mVal * 0.7);
                specDst[idx + 2] = Math.floor(src[idx + 2] * 0.3 + mVal * 0.7);
                specDst[idx + 3] = 255;

                if (preset === 'unity-metal') {
                    pDst[idx]     = mVal;
                    pDst[idx + 1] = 0;
                    pDst[idx + 2] = 0;
                    pDst[idx + 3] = smVal;
                } else if (preset === 'unity-spec') {
                    pDst[idx]     = specDst[idx];
                    pDst[idx + 1] = specDst[idx + 1];
                    pDst[idx + 2] = specDst[idx + 2];
                    pDst[idx + 3] = smVal;
                } else if (preset === 'unreal') {
                    pDst[idx]     = aoVal;
                    pDst[idx + 1] = rVal;
                    pDst[idx + 2] = mVal;
                    pDst[idx + 3] = 255;
                } else if (preset === 'godot') {
                    pDst[idx]     = mVal;
                    pDst[idx + 1] = rVal;
                    pDst[idx + 2] = 0;
                    pDst[idx + 3] = 255;
                }
            }
        }

        ctxs['Normal'].putImageData(normImg, 0, 0);
        ctxs['Height'].putImageData(hImg, 0, 0);
        ctxs['Metallic'].putImageData(mImg, 0, 0);
        ctxs['Roughness'].putImageData(rImg, 0, 0);
        ctxs['Smoothness'].putImageData(sImg, 0, 0);
        ctxs['Specular'].putImageData(specImg, 0, 0);
        ctxs['AmbientOcclusion'].putImageData(aoImg, 0, 0);
        ctxs['Packed'].putImageData(pImg, 0, 0);
    });

    function getMono(src, x, y, w, h) {
        if (x < 0) x = 0; if (x >= w) x = w - 1;
        if (y < 0) y = 0; if (y >= h) y = h - 1;
        const idx = (y * w + x) * 4;
        return (src[idx] * 0.299 + src[idx + 1] * 0.587 + src[idx + 2] * 0.114) / 255.0;
    }

    function invertAllMaps() {
        mapTypes.forEach(map => {
            const canvas = document.getElementById(`canvas-${map}`);
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = 255 - data[i];
                data[i+1] = 255 - data[i+1];
                data[i+2] = 255 - data[i+2];
            }
            ctx.putImageData(imgData, 0, 0);
        });
    }

    function downloadCanvas(canvasId, mapName) {
        const canvas = document.getElementById(canvasId);
        if (canvas.width === 0 || canvas.height === 0) return;
        const mimeType = exportFormat.value;
        let ext = '.png';
        if (mimeType === 'image/jpeg') ext = '.jpg';
        if (mimeType === 'image/webp') ext = '.webp';
        if (mimeType === 'image/bmp') ext = '.bmp';

        const link = document.createElement('a');
        link.download = `${mapName}_${enginePreset.value}${ext}`;
        link.href = canvas.toToDataURL ? canvas.toDataURL(mimeType, 1.0) : canvas.toDataURL(mimeType);
        link.href = canvas.toDataURL(mimeType, 1.0);
        link.click();
    }

    function downloadAll() {
        mapTypes.forEach(map => {
            downloadCanvas(`canvas-${map}`, map);
        });
    }

    updatePackedLabel();
    initBlankCanvas();
</script>
